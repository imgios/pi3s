apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: librespeed
spec:
  interval: 30m
  releaseName: librespeed
  chart:
    spec:
      chart: app-template
      version: 4.1.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-labs
        namespace: librespeed
      interval: 30m
  targetNamespace: librespeed
  install:
    createNamespace: true
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: librespeed
    defaultPodOptions:
      securityContext:
        # https://github.com/librespeed/speedtest/issues/663
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
    controllers:
      librespeed:
        strategy: RollingUpdate
        containers:
          librespeed:
            image:
              repository: ghcr.io/librespeed/speedtest
              tag: 5.5.1@sha256:1c8ca636a9b68d023c819c5ce6e7fab3f5214b963138eb9ef6aaddf9ae111c77
            env:
              MODE: standalone
              WEBPORT: 8080
            securityContext:
              allowPrivilegeEscalation: false
              # cp: cannot create regular file '/var/www/html/speedtest.js': Read-only file system
              readOnlyRootFilesystem: false
              #+ chown -R www-data /var/www/html/backend /var/www/html/favicon.ico /var/www/html/index.php /var/www/html/speedtest.js /var/www/html/speedtest_worker.js
              #capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 50Mi
              limits:
                memory: 100Mi
    service:
      librespeed:
        controller: librespeed
        ports:
          http:
            port: 8080
    ingress:
      librespeed:
        enabled: true
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: "homelab-ca-issuer"
          cert-manager.io/subject-organizations: "imgios Homelab"
          cert-manager.io/subject-countries: "Planet Earth"
        hosts:
          - host: speed.homelab.giosuesulipano.it
            paths:
              - path: /
                service:
                  identifier: librespeed
                  port: http
        tls:
          - hosts:
            - speed.homelab.giosuesulipano.it
            secretName: hass-internal-tls
